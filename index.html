<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bead Pattern Tool</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Bead Pattern Tool</h1>
      <p class="hint">Upload photo and generate a bead pattern.</p>

      <label class="field">
        <span>Upload Image</span>
        <input id="fileInput" type="file" accept="image/*" />
      </label>

      <div class="field-row">
        <label class="field">
          <span>Preset</span>
          <select id="presetSelect">
            <option value="beginner">Beginner</option>
            <option value="advanced" selected>Advanced</option>
            <option value="pro">Pro</option>
          </select>
        </label>
        <label class="field">
          <span>Grid Width</span>
          <input id="gridWidth" type="number" min="8" max="256" value="64" />
        </label>
        <label class="field">
          <span>Palette Size</span>
          <input id="paletteSize" type="number" min="2" max="48" value="16" />
        </label>
      </div>

      <div class="field-row">
        <label class="field">
          <span>Merge Threshold (0-100)</span>
          <input id="mergeThreshold" type="number" min="0" max="100" value="0" />
        </label>
        <label class="field">
          <span>Watermark Opacity (0-100)</span>
          <input id="watermarkOpacity" type="number" min="0" max="100" value="38" />
        </label>
      </div>

      <div class="field-row">
        <label class="field check-field">
          <span>Use Dithering</span>
          <input id="ditherInput" type="checkbox" checked />
        </label>
        <label class="field check-field">
          <span>Show Code in Cell</span>
          <input id="showCodeInput" type="checkbox" checked />
        </label>
      </div>

      <section class="pay-card">
        <h2>Order Now</h2>
        <p class="pay-note">Standard: 9.9 / Pro: 19.9. Send payment screenshot + photo after payment.</p>
        <div class="pay-qr-grid">
          <figure class="pay-qr-item">
            <img src="./wechat-pay.jpg" alt="WeChat QR" />
            <figcaption>WeChat</figcaption>
          </figure>
          <figure class="pay-qr-item">
            <img src="./alipay-pay.jpg" alt="Alipay QR" />
            <figcaption>Alipay</figcaption>
          </figure>
        </div>
      </section>

      <div class="actions">
        <button id="generateBtn" type="button" class="btn-primary">Generate</button>
        <button id="downloadBtn" type="button" class="btn-secondary" disabled>Export PNG</button>
        <button id="exportAllBtn" type="button" class="btn-ghost" disabled>Export PNG+CSV</button>
      </div>
    </section>

    <section class="canvas-panel">
      <canvas id="patternCanvas" width="640" height="640"></canvas>
      <div id="legend" class="legend"></div>
    </section>
  </main>

  <script src="./mard221-palette.js"></script>
  <script src="./script.js"></script>
</body>
</html>
